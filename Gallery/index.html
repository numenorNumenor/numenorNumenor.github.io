<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/favicon-32x32.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&display=swap" rel="stylesheet"> 
  <link rel="stylesheet" href="css/style.css">
  <!-- <link rel="stylesheet" href="css/painting.css"> -->
   <link rel="stylesheet" href="css/768.css">
  <link rel="stylesheet" href="css/1440.css"> 
  
  <title>Frontend Mentor | Galleria slideshow site</title>
</head>
<body>

  <nav>
    <div class="nav__wrapper container--el">
      <a href="index.html">
        <img class="logo--el" src="./assets/shared/logo.svg" alt="logo">
      </a>

      <a href="starry-night.html" class="start__slideshow">
        start slideshow
      </a>
    </div> <!-- end of nav__wrapper-->
  </nav>

  <section class="container--el">
    <div class="content__wrapper">

    </div> 
    <!-- end of content__wrapper -->
  </section>
  <footer>
    <div class="progress__bar">
    <div class="progress__value"></div>
    </div>
    <div class="footer__wrapper container--el">
      <div class="text__container">
          <h6>${name}</h6>
          <p class="p__author">${author}</p>
      </div>
      <div class="controls__container">
          <img class="arrow arrow--left" src="./assets/shared/icon-back-button.svg" alt="">
          <img class="arrow arrow--right" src="./assets/shared/icon-next-button.svg" alt="">
      </div>
    </div>
  </footer>

  <!-- end of section -->

  <script src="js/scriptMain.js"></script>
</body>
</html>
